<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Kariuki Studio Admin Login</title>

<style>
  /* MOBILE RESPONSIVE FIXES */
@media (max-width: 900px) {
  /* Navigation menu stacks vertically */
  nav ul {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    margin-top: 10px;
  }

  /* Service boxes stack */
  .service-container {
    flex-direction: column;
  }
  .service-box {
    width: 100% !important;
  }

  /* Gallery images stack */
  .gallery {
    grid-template-columns: 1fr !important;
  }
  .gallery img {
    width: 100% !important;
    height: auto;
  }

  /* Hero text scaling */
  .hero h2 {
    font-size: 35px;
  }
  .hero p {
    font-size: 16px;
  }
  .hero .btn {
    padding: 10px 25px;
    font-size: 14px;
  }

  /* Form inputs full width */
  form input, form textarea {
    width: 100%;
  }

  /* Payment section cards stack */
  #studio-payment > div {
    flex-direction: column;
  }
}
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #000000, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    color: #fff;
  }
  .login-container {
    background: #111;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(212,175,55,0.4);
    text-align: center;
    width: 90%;
    max-width: 380px;
  }
  h1 {
    color: #d4af37;
    margin-bottom: 25px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #fff;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #d4af37;
    border: none;
    border-radius: 8px;
    color: #000;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover {
    background: #fff;
  }
  .error {
    color: #ff6060;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
<style>
  body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    
    /* Full-screen background image */
    background-image: url('pics/photo-1501887466182-d2b0b650b465.avif'); /* <-- Replace with your image path */
    background-size: cover;       /* Cover the entire screen */
    background-position: center;  /* Center the image */
    background-repeat: no-repeat; /* Do not repeat */
    background-attachment: fixed; /* Optional: makes the background fixed while scrolling */
    color: #fff;                  /* Text color over image */
  }

  /* Optional: dark overlay to make text readable */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6); /* adjust opacity as needed */
    z-index: -1;
  }
</style>
<style>
body{
  background-image: url("https://images.unsplash.com/photo-1511379938547-c1f69419868d?fm=jpg&q=80&w=3840");
  background-size: cover;

</head>
<body>
    <!-- Page Header -->
<header style="text-align:center; margin-bottom:30px;">
  <h1 style="font-family:'Playfair Display', serif; font-size:32px; color:#f3f1eb; letter-spacing:1px;">
    KARIUKI RECORDS STUDIOZ ADMIN LOGIN
  </h1>
  <p style="color:#38f10a;font-family: Arial, Helvetica, sans-serif; margin-top:5px;">Only authorized personnel can access this dashboard</p>
</header>
  <div class="login-container">
    <h1>Admin Login</h1>
    <input type="email" id="email" placeholder="Enter your email" required>
    <input type="password" id="password" placeholder="Enter password" required>
    <button id="loginBtn">Login</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    const allowedEmails = [
      "kariukilameck06@gmail.com",
      "kobadiah9@gmail.com"
    ];

    // You can later replace this with hashed passwords or a backend validation
    const adminPassword = "studioadmin2026"; // change this to your own secret password

    document.getElementById('loginBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const error = document.getElementById('errorMsg');

      if (!allowedEmails.includes(email)) {
        error.textContent = "❌ Unauthorized email. Access denied.";
        return;
      }

      if (password !== adminPassword) {
        error.textContent = "❌ Incorrect password.";
        return;
      }

      // Save session (optional)
      localStorage.setItem('adminEmail', email);

      // Redirect to admin dashboard
      window.location.href = "admin.html";
    });
  </script>
</body>
</html>
